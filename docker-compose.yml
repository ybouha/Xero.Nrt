services:
  postgres:
    image: postgres:18
    container_name: xero-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tc0ab1y
      POSTGRES_DB: Xero
    ports:
      - "5433:5432"
    volumes:
      - xero-postgres-data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Xero"]
      interval: 2s
      timeout: 5s
      retries: 30

  couchbase:
    image: couchbase:community-7.2.4
    container_name: xero-couchbase
    ports:
      - "8091:8091"   # Web UI / management
      - "8092:8092"   # Views
      - "8093:8093"   # Query (N1QL)
      - "8094:8094"   # Search
      - "11210:11210" # KV
    volumes:
      - xero-couchbase-data:/opt/couchbase/var
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/ui/index.html"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  xero-postgres-data:
  xero-couchbase-data:
